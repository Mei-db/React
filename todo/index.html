<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Todo App</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="app">
        <h1>TaskFlow</h1>
        <div class="sub">Streamline your productivity</div>
        <div class="inputWrap">
            <input id="taskInput" placeholder="What needs to be done?">
            <button class="btn" onclick="addTask()">＋ Add Task</button>
        </div>
        <div class="toolbar">
            <div class="filters">
                <button class="chip active" data-filter="all">All</button>
                <button class="chip" data-filter="pending">Pending</button>
                <button class="chip" data-filter="completed">Completed</button>
            </div>
            <div class="count"><span id="count">0</span> tasks left</div>
        </div>
        <div class="list" id="list"></div>
    </div>
    <script src="script.js"></script>

</body>

</html>
